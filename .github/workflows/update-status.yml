name: Update server status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch live status
        run: |
          set -e
          RAW="$(mktemp)"
          if curl -fsS --max-time 12 "http://37.150.212.7:8080/api/status" -o "$RAW"; then
            node <<'NODE'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync(process.env.RAW, 'utf8'));
          const out = {
            running: !!raw.running,
            players: Number(raw.players || 0),
            maxPlayers: Number(raw.maxPlayers || 50),
            updatedAt: new Date().toISOString(),
            source: 'manager'
          };
          fs.writeFileSync('status.json', JSON.stringify(out, null, 2) + '\n');
          console.log(out);
          NODE
          else
            echo "Manager unreachable, keeping previous status.json"
          fi
        env:
          RAW: /tmp/scum-status.json

      - name: Commit status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --cached --quiet; then
            echo "No status changes"
          else
            git commit -m "chore: refresh live server status"
            git push
          fi
